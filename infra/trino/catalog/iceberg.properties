# Trino -> Nessie (native catalog) -> Iceberg on S3.
# No OAuth: Nessie runs auth-disabled on the private VM. AWS creds via env (default chain).
connector.name=iceberg
iceberg.catalog.type=nessie
iceberg.nessie-catalog.uri=http://nessie:19120/api/v2
iceberg.nessie-catalog.ref=main
iceberg.nessie-catalog.default-warehouse-dir=s3://dataplatformpoc-venketa/warehouse
fs.native-s3.enabled=true
s3.region=us-east-2
# For the reference/creative tables whose DATA sits on Azure ADLS, additionally enable:
#   fs.native-azure.enabled=true
#   azure.auth-type=... (account key / OAuth)
